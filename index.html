<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet Activity Tracker</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eef3f8;
}

.wrapper{
    max-width:760px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#2c3e50;
}

label{
    display:block;
    margin-top:15px;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    box-sizing:border-box;
}

button{
    margin-top:18px;
    padding:10px 18px;
    cursor:pointer;
}

.record{
    margin-top:15px;
    padding:12px;
    border-radius:6px;
    background:#f6f9fc;
    border-left:5px solid #3498db;
}

footer{
    text-align:center;
    margin-top:25px;
    color:#666;
    font-size:13px;
}
</style>

</head>
<body>

<div class="wrapper">

<h1>Wallet Activity Tracker</h1>

<p>Create simple activity records.</p>

<label>Category</label>

<select id="category">
<option>Bitcoin</option>
<option>Wallet</option>
<option>General</option>
</select>

<label>Title</label>

<input id="title" type="text">

<label>Amount</label>

<input id="amount" type="number">

<button id="addButton">Add Record</button>

<button id="removeButton">Clear All</button>

<h2>Activity List</h2>

<div id="output"></div>

<footer>
Single-file HTML demonstration.
</footer>

</div>

<script>

// Store activity records
const records=[];

// Cache page elements
const category=document.getElementById("category");
const title=document.getElementById("title");
const amount=document.getElementById("amount");
const output=document.getElementById("output");

// Display every record
function refreshView(){

    output.innerHTML="";

    records.forEach(function(item){

        const card=document.createElement("div");
        card.className="record";

        const heading=document.createElement("strong");
        heading.textContent=item.title;

        const info=document.createElement("p");
        info.textContent=
            "Category: "+item.category+
            " | Amount: "+item.amount;

        card.appendChild(heading);
        card.appendChild(info);

        output.appendChild(card);

    });

}

// Add new activity
document.getElementById("addButton").onclick=function(){

    if(title.value.trim()===""||amount.value===""){
        alert("Complete every field.");
        return;
    }

    records.push({
        category:category.value,
        title:title.value.trim(),
        amount:amount.value
    });
